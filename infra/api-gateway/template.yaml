AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Truly Imagined v3 - API Gateway + Lambda Services (Phase 1)

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: nodejs18.x
    Role: arn:aws:iam::440779547223:role/trimg-lambda-execution-role
    Environment:
      Variables:
        NODE_ENV: !Ref Environment
        AUTH0_DOMAIN: !Ref Auth0Domain
        AUTH0_AUDIENCE: !Ref Auth0Audience
        AWS_REGION: !Ref AWS::Region

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - development
      - staging
      - production
    Description: Deployment environment

  HdicrDatabaseURL:
    Type: String
    Description: HDICR PostgreSQL connection string (format postgresql://user:pass@host:5432/db)
    NoEcho: true

  Auth0Domain:
    Type: String
    Description: Auth0 domain (e.g., your-tenant.auth0.com)
    Default: ''

  Auth0Audience:
    Type: String
    Description: Auth0 API audience/identifier
    Default: https://api.trulyimagined.com

Resources:
  # ========================================
  # API Gateway
  # ========================================

  TrulyImaginedApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: trulyimagined-api-v3
      StageName: prod
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'https://trulyimagined.com'" # Restrict to production domain
      Auth:
        DefaultAuthorizer: NONE # We'll handle Auth0 in functions
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          # Stage-level throttling: 50 steady-state requests/second, burst up to 100
          ThrottlingBurstLimit: 100
          ThrottlingRateLimit: 50
          # Logging for audit trail
          LoggingLevel: INFO
          DataTraceEnabled: false # Do not log full request/response bodies (PII risk)
          MetricsEnabled: true

  HdicrClientApiKey:
    Type: AWS::ApiGateway::ApiKey
    DependsOn: TrulyImaginedApiProdStage
    Properties:
      Name: !Sub hdicr-standard-client-${Environment}
      Description: API key attached to the standard HDICR usage plan for per-client throttling and metrics.
      Enabled: true

  HdicrUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn: TrulyImaginedApiProdStage
    Properties:
      UsagePlanName: !Sub hdicr-standard-plan-${Environment}
      Description: Lower per-client throttle envelope layered beneath the global stage throttle.
      ApiStages:
        - ApiId: !Ref TrulyImaginedApi
          Stage: prod
      Throttle:
        BurstLimit: 50
        RateLimit: 20
      Quota:
        Limit: 10000
        Period: DAY

  HdicrUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref HdicrClientApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref HdicrUsagePlan

  # ========================================
  # Identity Service Lambda (Step 5: Identity Registry MVP)
  # ========================================

  IdentityFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub trulyimagined-identity-${Environment}
      CodeUri: ../../services/identity-service/dist
      Handler: index.handler
      Description: Identity Registry - Actor registration and management
      Environment:
        Variables:
          HDICR_DATABASE_URL: !Ref HdicrDatabaseURL
      Events:
        RegisterActor:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/identity/register
            Method: POST
            Auth:
              ApiKeyRequired: true
        ListAdminUsers:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/identity/admin/users
            Method: GET
            Auth:
              ApiKeyRequired: true
        GetActorById:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/identity/{id}
            Method: GET
            Auth:
              ApiKeyRequired: true
        ListActors:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/identity
            Method: GET
            Auth:
              ApiKeyRequired: true
        UpdateActor:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/identity/{id}
            Method: PUT
            Auth:
              ApiKeyRequired: true
        VerifyActor:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/identity/{id}/verify
            Method: POST
            Auth:
              ApiKeyRequired: true
        UpsertIdentityLink:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/identity/link/upsert
            Method: POST
            Auth:
              ApiKeyRequired: true

  # ========================================
  # Consent Service Lambda (Step 6: Consent Ledger - CRITICAL)
  # ========================================

  ConsentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub trulyimagined-consent-${Environment}
      CodeUri: ../../services/consent-service/dist
      Handler: index.handler
      Description: Consent Ledger - Immutable consent recording
      Environment:
        Variables:
          HDICR_DATABASE_URL: !Ref HdicrDatabaseURL
      Events:
        GrantConsent:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/consent/grant
            Method: POST
            Auth:
              ApiKeyRequired: true
        RevokeConsent:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/consent/revoke
            Method: POST
            Auth:
              ApiKeyRequired: true
        CheckConsent:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/consent/check
            Method: GET
            Auth:
              ApiKeyRequired: true
        GetConsentHistory:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/consent/{actorId}
            Method: GET
            Auth:
              ApiKeyRequired: true
        ListConsentHistory:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/consent/list
            Method: GET
            Auth:
              ApiKeyRequired: true

  # ========================================
  # Licensing Service Lambda (Step 10: Licensing Service MVP)
  # ========================================

  LicensingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub trulyimagined-licensing-${Environment}
      CodeUri: ../../services/licensing-service/dist
      Handler: index.handler
      Description: Licensing - Request and approve licenses
      Environment:
        Variables:
          HDICR_DATABASE_URL: !Ref HdicrDatabaseURL
      Events:
        RequestLicense:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/license/request
            Method: POST
            Auth:
              ApiKeyRequired: true
        GetLicenseRequests:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/license/actor/{actorId}
            Method: GET
            Auth:
              ApiKeyRequired: true
        ApproveLicense:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/license/{requestId}/approve
            Method: POST
            Auth:
              ApiKeyRequired: true
        RejectLicense:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/license/{requestId}/reject
            Method: POST
            Auth:
              ApiKeyRequired: true

  # ========================================
  # Representation Service Lambda (HDICR-owned: SEP-026)
  # ========================================

  RepresentationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub trulyimagined-representation-${Environment}
      CodeUri: ../../services/representation-service/dist
      Handler: index.handler
      Description: Representation - Actor-agent relationships and requests
      Environment:
        Variables:
          HDICR_DATABASE_URL: !Ref HdicrDatabaseURL
      Events:
        GetActorByAuth0:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/representation/actor
            Method: GET
            Auth:
              ApiKeyRequired: true
        GetAgentByAuth0:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/representation/agent
            Method: GET
            Auth:
              ApiKeyRequired: true
        GetActiveRepresentation:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/representation/active
            Method: GET
            Auth:
              ApiKeyRequired: true
        GetAgentByRegistry:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/representation/agent-by-registry
            Method: GET
            Auth:
              ApiKeyRequired: true
        CheckPendingRequest:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/representation/request/pending
            Method: GET
            Auth:
              ApiKeyRequired: true
        CreateRepresentationRequest:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/representation/request
            Method: POST
            Auth:
              ApiKeyRequired: true
        ListIncomingRequests:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/representation/requests/incoming
            Method: GET
            Auth:
              ApiKeyRequired: true
        ListOutgoingRequests:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/representation/requests/outgoing
            Method: GET
            Auth:
              ApiKeyRequired: true
        GetRepresentationRequest:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/representation/request
            Method: GET
            Auth:
              ApiKeyRequired: true
        UpdateRepresentationRequest:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/representation/request/update
            Method: POST
            Auth:
              ApiKeyRequired: true
        CheckActiveRelationship:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/representation/relationship/active
            Method: GET
            Auth:
              ApiKeyRequired: true
        CreateRelationship:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/representation/relationship
            Method: POST
            Auth:
              ApiKeyRequired: true
        GetRelationship:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/representation/relationship
            Method: GET
            Auth:
              ApiKeyRequired: true
        EndRelationship:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/representation/relationship/end
            Method: POST
            Auth:
              ApiKeyRequired: true

# ========================================
# Outputs
# ========================================

Outputs:
  ApiGatewayUrl:
    Description: URL of the API Gateway
    Value: !Sub 'https://${TrulyImaginedApi}.execute-api.${AWS::Region}.amazonaws.com/prod'
    Export:
      Name: TrulyImaginedApiUrl

  HdicrUsagePlanId:
    Description: API Gateway usage plan ID for standard HDICR clients
    Value: !Ref HdicrUsagePlan

  HdicrClientApiKeyId:
    Description: API Gateway API key ID for standard HDICR clients
    Value: !Ref HdicrClientApiKey

  IdentityFunctionArn:
    Description: ARN of Identity Service Lambda
    Value: !GetAtt IdentityFunction.Arn

  ConsentFunctionArn:
    Description: ARN of Consent Service Lambda
    Value: !GetAtt ConsentFunction.Arn

  LicensingFunctionArn:
    Description: ARN of Licensing Service Lambda
    Value: !GetAtt LicensingFunction.Arn

  RepresentationFunctionArn:
    Description: ARN of Representation Service Lambda (HDICR-owned)
    Value: !GetAtt RepresentationFunction.Arn
