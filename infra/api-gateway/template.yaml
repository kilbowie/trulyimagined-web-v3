AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Truly Imagined v3 - API Gateway + Lambda Services (Phase 1)

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: nodejs18.x
    Role: arn:aws:iam::440779547223:role/trimg-lambda-execution-role
    Environment:
      Variables:
        DATABASE_URL: !Ref DatabaseURL
        NODE_ENV: !Ref Environment
        AUTH0_DOMAIN: !Ref Auth0Domain
        AUTH0_AUDIENCE: !Ref Auth0Audience
        AWS_REGION: !Ref AWS::Region

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - development
      - staging
      - production
    Description: Deployment environment

  DatabaseURL:
    Type: String
    Description: PostgreSQL connection string (format postgresql://user:pass@host:5432/db)
    NoEcho: true

  Auth0Domain:
    Type: String
    Description: Auth0 domain (e.g., your-tenant.auth0.com)
    Default: ''

  Auth0Audience:
    Type: String
    Description: Auth0 API audience/identifier
    Default: https://api.trulyimagined.com

Resources:
  # ========================================
  # API Gateway
  # ========================================

  TrulyImaginedApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: trulyimagined-api-v3
      StageName: prod
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'https://trulyimagined.com'" # Restrict to production domain
      Auth:
        DefaultAuthorizer: NONE # We'll handle Auth0 in functions
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          # Stage-level throttling: 50 steady-state requests/second, burst up to 100
          ThrottlingBurstLimit: 100
          ThrottlingRateLimit: 50
          # Logging for audit trail
          LoggingLevel: INFO
          DataTraceEnabled: false # Do not log full request/response bodies (PII risk)
          MetricsEnabled: true

  # ========================================
  # Identity Service Lambda (Step 5: Identity Registry MVP)
  # ========================================

  IdentityFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub trulyimagined-identity-${Environment}
      CodeUri: ../../services/identity-service/dist
      Handler: index.handler
      Description: Identity Registry - Actor registration and management
      Events:
        RegisterActor:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/identity/register
            Method: POST
        ListAdminUsers:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/identity/admin/users
            Method: GET
        GetActorById:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/identity/{id}
            Method: GET
        ListActors:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/identity
            Method: GET
        UpdateActor:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/identity/{id}
            Method: PUT

  # ========================================
  # Consent Service Lambda (Step 6: Consent Ledger - CRITICAL)
  # ========================================

  ConsentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub trulyimagined-consent-${Environment}
      CodeUri: ../../services/consent-service/dist
      Handler: index.handler
      Description: Consent Ledger - Immutable consent recording
      Events:
        GrantConsent:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/consent/grant
            Method: POST
        RevokeConsent:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/consent/revoke
            Method: POST
        CheckConsent:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/consent/check
            Method: GET
        GetConsentHistory:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/consent/{actorId}
            Method: GET
        ListConsentHistory:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/consent/list
            Method: GET

  # ========================================
  # Licensing Service Lambda (Step 10: Licensing Service MVP)
  # ========================================

  LicensingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub trulyimagined-licensing-${Environment}
      CodeUri: ../../services/licensing-service/dist
      Handler: index.handler
      Description: Licensing - Request and approve licenses
      Events:
        RequestLicense:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/license/request
            Method: POST
        GetLicenseRequests:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/license/actor/{actorId}
            Method: GET
        ApproveLicense:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/license/{requestId}/approve
            Method: POST
        RejectLicense:
          Type: Api
          Properties:
            RestApiId: !Ref TrulyImaginedApi
            Path: /v1/license/{requestId}/reject
            Method: POST

# ========================================
# Outputs
# ========================================

Outputs:
  ApiGatewayUrl:
    Description: URL of the API Gateway
    Value: !Sub 'https://${TrulyImaginedApi}.execute-api.${AWS::Region}.amazonaws.com/prod'
    Export:
      Name: TrulyImaginedApiUrl

  IdentityFunctionArn:
    Description: ARN of Identity Service Lambda
    Value: !GetAtt IdentityFunction.Arn

  ConsentFunctionArn:
    Description: ARN of Consent Service Lambda
    Value: !GetAtt ConsentFunction.Arn

  LicensingFunctionArn:
    Description: ARN of Licensing Service Lambda
    Value: !GetAtt LicensingFunction.Arn
