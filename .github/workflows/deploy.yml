name: CI/CD Pipeline

# SECURITY POLICY:
# ═══════════════════════════════════════════════════════════════════════════
# This pipeline enforces THREE hard gates before any code reaches production:
#
# 1. TYPE-CHECK (Lint Job)
#    - Enforces TypeScript strict mode across 8 workspace projects
#    - Failure BLOCKS all deployments (hard gate)
#    - Run locally: pnpm type-check
#
# 2. LINT CHECK (Lint Job)
#    - Enforces code style and catches common errors
#    - Failure blocks deployments
#    - Run locally: pnpm lint
#
# 3. BUILD VERIFICATION (Build Job)
#    - Verifies production bundle compiles and optimizes correctly
#    - Failure blocks preview and production deployments
#    - Run locally: pnpm build
#
# NO EXCEPTIONS: Type-check and lint failures cannot be overridden.
# See CI_GATES.md for emergency procedures and branch protection setup.
# ═══════════════════════════════════════════════════════════════════════════

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  # Job 1: Type Check & Lint (HARD GATE - required for all downstream jobs)
  # This job MUST pass before security, test, or build jobs can proceed.
  # Type-check failures immediately block all deployments.
  lint:
    name: Type Check & Lint (Hard Gate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared types
        run: pnpm --filter @trulyimagined/types build

      - name: Type check (HARD GATE - fail-closes pipeline on error)
        run: |
          echo "Enforcing TypeScript strict mode across 8 workspace projects..."
          pnpm type-check
          echo "✅ Type-check passed. Pipeline proceeds to downstream jobs."

      - name: Lint (fail-closes pipeline on error)
        run: |
          echo "Checking code style and common errors..."
          pnpm lint
          echo "✅ Lint passed."

      - name: Enforce HDICR DB import guardrail
        shell: bash
        run: |
          bash scripts/check-hdicr-db-coimport.sh

  # Job 2: Security Scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Snyk Security Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=package.json

      - name: Upload Snyk results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk.sarif

      - name: Run pnpm audit
        # GHSA-h25m-26qc-wcjf (Next.js <15.0.8 DoS) is ignored pending Next.js 15 migration.
        # Tracked: upgrade next to ^15.3.0 before removing this ignore flag.
        # pnpm v8 lacks --ignore-advisories, so we filter via JSON output instead.
        run: |
          pnpm audit --production --audit-level=high --json | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          ignored = {'GHSA-h25m-26qc-wcjf'}
          hits = [a for a in d.get('advisories', {}).values()
                  if a.get('severity') in ('high', 'critical')
                  and a.get('github_advisory_id') not in ignored]
          for a in hits:
              print(f'FAIL [{a[\"severity\"]}]: {a[\"title\"]} ({a.get(\"github_advisory_id\",\"\")})')
          sys.exit(1 if hits else 0)
          "

  # Job 3: Unit Tests
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test
        env:
          HDICR_ADAPTER_MODE: local

      - name: Run web integration contract tests
        if: github.event_name == 'pull_request'
        run: pnpm --filter @trulyimagined/web test:integration
        env:
          HDICR_ADAPTER_MODE: local

  # Job 4: Build Check (requires lint + security)
  # If type-check failed in lint job, this job is skipped and deployment is blocked.
  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint, security]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared types
        run: pnpm --filter @trulyimagined/types build

      - name: Build application (HARD GATE - fail-closes deployment)
        run: |
          echo "Building production bundle with type-check already enforced..."
          pnpm build
        env:
          # Provide minimal env vars for build (not secrets)
          NEXT_PUBLIC_APP_URL: https://trulyimagined.com
          NODE_ENV: production
          HDICR_ADAPTER_MODE: remote
          HDICR_REMOTE_BASE_URL: https://api.trulyimagined.com

  # Job 5: Deploy to Vercel
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel Production
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./apps/web

      - name: Notify Sentry of Deployment
        if: success()
        run: |
          curl -X POST https://sentry.io/api/0/organizations/${{ secrets.SENTRY_ORG }}/releases/ \
            -H 'Authorization: Bearer ${{ secrets.SENTRY_AUTH_TOKEN }}' \
            -H 'Content-Type: application/json' \
            -d '{
              "version": "${{ github.sha }}",
              "projects": ["${{ secrets.SENTRY_PROJECT }}"],
              "ref": "${{ github.ref }}",
              "commits": [{
                "id": "${{ github.sha }}",
                "repository": "${{ github.repository }}"
              }]
            }'
        continue-on-error: true

  # Job 6: Deploy Preview (for PRs and develop branch)
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel Preview
        uses: amondnet/vercel-action@v25
        id: vercel-preview
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./apps/web

      - name: Comment Preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Preview deployment ready!\n\n🔗 **Preview URL:** ${{ steps.vercel-preview.outputs.preview-url }}\n\n_Commit: ${{ github.sha }}_`
            })
