name: HDICR Services Deploy

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/**'
      - 'infra/api-gateway/**'
      - 'infra/database/**'
      - 'shared/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.json'
      - '.github/workflows/hdicr-deploy.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/**'
      - 'infra/api-gateway/**'
      - 'infra/database/**'
      - 'shared/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.json'
      - '.github/workflows/hdicr-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'SAM config environment'
        required: true
        type: choice
        options:
          - hdicr-local
          - hdicr-production

jobs:
  hdicr-verify:
    name: Build and Test HDICR Services
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @trulyimagined/types build
          pnpm --filter @trulyimagined/database build
          pnpm --filter @trulyimagined/middleware build

      - name: Build HDICR services
        run: |
          pnpm --filter @trulyimagined/identity-service build
          pnpm --filter @trulyimagined/consent-service build
          pnpm --filter @trulyimagined/licensing-service build
          pnpm --filter @trulyimagined/representation-service build

      - name: Run HDICR service tests
        run: |
          pnpm --filter @trulyimagined/identity-service test
          pnpm --filter @trulyimagined/consent-service test
          pnpm --filter @trulyimagined/licensing-service test
          pnpm --filter @trulyimagined/representation-service test

  deploy-hdicr:
    name: Deploy HDICR Platform
    runs-on: ubuntu-latest
    needs: [hdicr-verify]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SAM
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.HDICR_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.HDICR_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.HDICR_AWS_REGION }}

      - name: SAM Build
        run: |
          cd infra/api-gateway
          sam build --template-file template.yaml

      - name: SAM Deploy
        run: |
          cd infra/api-gateway
          sam deploy --config-env hdicr-production --no-confirm-changeset --no-fail-on-empty-changeset
